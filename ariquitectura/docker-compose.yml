version: '3.9'

# ============================================================
# AIRFLOW 3.2.2 + POSTGRESQL DWH
# BD Fuente: conexión externa por credenciales
# BD DWH:    PostgreSQL levantado en Docker (guarda el modelo estrella)
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:3.2.2-python3.12
  environment:
    # ── Airflow core ──────────────────────────────────────────
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: 'tu_fernet_key_de_32_bytes_aqui_cambiame='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

    # ── Base de datos interna de Airflow (metadata) ───────────
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_meta:5432/airflow

    # ── Webserver ─────────────────────────────────────────────
    AIRFLOW__WEBSERVER__SECRET_KEY: 'cambia_este_secret_key_en_produccion'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'

    # ── BD FUENTE (externa, solo credenciales) ────────────────
    SOURCE_DB_HOST: 'host_de_tu_bd_fuente'       # <-- cambia aquí
    SOURCE_DB_PORT: '5432'
    SOURCE_DB_NAME: 'nombre_bd_fuente'            # <-- cambia aquí
    SOURCE_DB_USER: 'usuario_fuente'              # <-- cambia aquí
    SOURCE_DB_PASS: 'password_fuente'             # <-- cambia aquí

    # ── BD DWH (PostgreSQL en Docker) ────────────────────────
    DWH_DB_HOST: 'postgres_dwh'
    DWH_DB_PORT: '5432'
    DWH_DB_NAME: 'datawarehouse'
    DWH_DB_USER: 'dwh_user'
    DWH_DB_PASS: 'dwh_password'

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./requirements.txt:/requirements.txt

  depends_on:
    postgres_meta:
      condition: service_healthy

  networks:
    - etl_network


services:

  # ── 1. PostgreSQL: metadata interna de Airflow ─────────────
  postgres_meta:
    image: postgres:15
    container_name: postgres_meta
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - etl_network
    restart: unless-stopped


  # ── 2. PostgreSQL: Data Warehouse (modelo estrella) ─────────
  postgres_dwh:
    image: postgres:15
    container_name: postgres_dwh
    environment:
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_password
      POSTGRES_DB: datawarehouse
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
      - ./init_dwh:/docker-entrypoint-initdb.d   # scripts SQL de inicialización
    ports:
      - "5433:5432"   # expuesto en 5433 para no chocar con el meta
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dwh_user", "-d", "datawarehouse"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - etl_network
    restart: unless-stopped


  # ── 3. Airflow: inicialización de BD ────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install -r /requirements.txt
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: on-failure
    depends_on:
      postgres_meta:
        condition: service_healthy
      postgres_dwh:
        condition: service_healthy


  # ── 4. Airflow: Webserver (UI) ───────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully


  # ── 5. Airflow: Scheduler ────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully


volumes:
  postgres_meta_data:
  postgres_dwh_data:


networks:
  etl_network:
    driver: bridge